name: Django CI

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository # check out the repository
        uses: actions/checkout@v4

      - name: Set up Python # set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Project Dependencies # install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django Tests # run Django tests
        run: |
          python manage.py test

      - name: Run Django System Check # run Django system check
        run: |
          python manage.py check

      - name: Check for Missing Migrations # check for missing migrations
        run: |
          python manage.py makemigrations --check --dry-run

# add semgrep static code analysis to the CI workflow

      - name: Install Semgrep   # install semgrep for static code analysis
        run: |
            python -m pip install --upgrade pip
            pip install semgrep

      - name: Run Semgrep # run static code analysis using semgrep
        run: semgrep scan --config p/python --config p/django --config auto #--config auto added to automatically detect the language and framework of the project  

        
# add gitleaks secret scanning to the CI workflow

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_x64.tar.gz
          tar -xzf gitleaks_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          gitleaks detect --source . --verbose